name: Sync Protocol Data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"  # hourly

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v6
        with:
          ref: gh-pages
          path: gh-pages

      - name: Checkout master (code)
        uses: actions/checkout@v6
        with:
          ref: master
          path: master

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        working-directory: master
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run sync
        working-directory: master/src
        run: python sync.py --output ../../gh-pages/data/
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit to gh-pages if changed
        working-directory: gh-pages
        run: |
          set -e

          git add data/

          # Collect modified files
          modified_files=()
          while IFS= read -r file; do
            modified_files+=("$file")
          done < <(git diff --cached --name-only 2>/dev/null)

          if [ ${#modified_files[@]} -gt 0 ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            ts=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

            # Count new version files (not versions.json)
            new_versions=()
            for file in "${modified_files[@]}"; do
              if [[ "$file" == data/stable/* || "$file" == data/prerelease/* || "$file" == data/snapshot/* ]]; then
                basename="${file##*/}"
                version="${basename%.json}"
                new_versions+=("$version")
              fi
            done

            if [ ${#new_versions[@]} -eq 0 ]; then
              commit_msg="chore(data): update versions index $ts"
            elif [ ${#new_versions[@]} -le 3 ]; then
              commit_msg="chore(data): sync $(IFS=', '; echo "${new_versions[*]}") $ts"
            else
              commit_msg="chore(data): sync ${#new_versions[@]} new versions $ts"
            fi

            git commit -m "$commit_msg"
            git push
          else
            echo "No changes to commit."
          fi